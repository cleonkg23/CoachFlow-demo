<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f4f1ec">
  <meta
    name="description"
    content="Interactive CoachFlow demo showing how learner risk signals become clear intervention actions."
  >
  <title>CoachFlow Demo</title>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #f4f1ec;
    }

    body {
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    coachflow-demo {
      display: block;
      width: 100%;
      height: 100svh;
      min-height: 620px;
    }

    @supports not (height: 100svh) {
      coachflow-demo {
        height: 100vh;
      }
    }

    @media (max-height: 620px), (max-width: 720px) {
      body {
        overflow: auto;
      }

      coachflow-demo {
        height: max(100svh, 720px);
      }
    }
  </style>

  <script src="./coachflow-demo.js" defer></script>
</head>
<body>
  <coachflow-demo standalone height="100svh"></coachflow-demo>
</body>
</html>
